services:
  - type: web
    name: kipi-games
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GOOGLE_CLIENT_ID
        value: "116466179084-pv098dj9cj215eu8aaa93guu53dlpneo.apps.googleusercontent.com"
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
    disk:
      name: kipi-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
